server.port=8080
spring.application.name=api-gateway

# Member Service
spring.cloud.gateway.routes[0].id=member-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/members/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Book Service
spring.cloud.gateway.routes[1].id=book-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/books/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Borrow Service
spring.cloud.gateway.routes[2].id=borrow-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/borrows/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Reservation Service
spring.cloud.gateway.routes[3].id=reservation-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reservations/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Notification Service
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

spring.cloud.compatibility-verifier.enabled=false
